<!DOCTYPE html>
<html>
<head>
<title>PUBG Nickname Checker</title>
<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding-top:100px;
}

input{
padding:10px;
font-size:18px;
width:250px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:20px;
}

</style>
</head>

<body>

<h1>PUBG Nickname Checker</h1>

<input id="id" placeholder="Masukkan ID PUBG">
<button onclick="check()">Check</button>

<div id="result"></div>

<script>

async function check(){

let id=document.getElementById("id").value

document.getElementById("result").innerHTML="Loading..."

let r=await fetch(`/api/pubg?id=${id}`)

let data=await r.json()

if(data.status){

document.getElementById("result").innerHTML=
"Nickname: "+data.nickname

}else{

document.getElementById("result").innerHTML=
"Player tidak ditemukan"

}

}

</script>

</body>
</html>
